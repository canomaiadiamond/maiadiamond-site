<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maia Diamond</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Arka planı görsel yerine şık bir gradyan yaptık */
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            font-family: 'Times New Roman', Times, serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
        }

        img {
            /* Logonun boyutu */
            width: auto;
            max-width: 350px; 
            max-height: 50vh;
            height: auto;
            margin-bottom: 40px;
            /* Logoyu biraz öne çıkarmak için hafif bir parlama efekti */
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.2));
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            opacity: 0.9;
        }

        /* Mobil ekranlar için yazı boyutu ayarı */
        @media (max-width: 600px) {
            h1 { font-size: 1.1rem; letter-spacing: 3px; }
            img { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpeg" alt="Maia Diamond Logo">
        <h1>Sitemiz çok yakında sizlerle</h1>
    </div>

</body>
</html>
