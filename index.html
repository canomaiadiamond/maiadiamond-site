<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maia Diamond</title>
    <style>
        /* Tüm ekranı ortalamak için temel ayarlar */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden; /* Kaydırma çubuklarını gizler */
        }

        .content-wrapper {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logoyu ekranı dolduracak ama metne yer bırakacak şekilde ayarlar */
        img {
            width: auto;
            max-width: 90vw; /* Ekran genişliğinin %90'ı */
            max-height: 70vh; /* Ekran yüksekliğinin %70'i */
            height: auto;
            object-fit: contain;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
            padding: 0 20px;
        }

        /* Mobilde yazıyı biraz daha küçültür */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <img src="logo.jpeg" alt="Maia Diamond Logo">
        
        <h1>Sitemiz çok yakında sizlerle</h1>
    </div>

</body>
</html>
