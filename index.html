<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maia Diamond</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
        }

        body {
            /* Senin logon olan logo.jpeg dosyasını arka plan yapıyoruz */
            background: url('logo.jpeg') no-repeat center center fixed;
            background-size: cover; /* Resmi tüm ekrana yayar */
            
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Yazının logonun üzerinde net okunması için şık bir kutu */
        .message-box {
            background: rgba(0, 0, 0, 0.3); /* Çok hafif bir karartma */
            padding: 20px 40px;
            border-radius: 2px;
            text-align: center;
        }

        h1 {
            color: #f1f1f1;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="message-box">
        <h1>Sitemiz çok yakında sizlerle</h1>
    </div>

</body>
</html>
